name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint-and-unit:
    # Display name kept as the original "Lint + Vitest unit tests" so the
    # branch protection rule on main (which requires a check by that name)
    # still matches. The job actually runs lint + typecheck + vitest now —
    # see the steps below. When you next update branch protection, feel
    # free to rename to "Lint + Typecheck + Vitest unit tests" and update
    # the required-check setting in tandem.
    name: Lint + Vitest unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install dependencies
        run: bun install

      - name: Run ESLint
        run: bun run lint

      # tsc --build against the project references (tsconfig.app.json +
      # tsconfig.node.json). This is the first time the repo enforces
      # type-checking in CI — before this PR, `npm run build` was just
      # `vite build` (transpile-only, no type check), so type errors
      # accumulated silently. Runs early so a bad typing regression
      # fails fast before the longer Vitest step.
      - name: Run tsc --build (typecheck)
        run: bun run typecheck

      - name: Run Vitest (unit + integration)
        shell: bash
        run: |
          set -o pipefail
          bunx vitest run --reporter=verbose 2>&1 | tee vitest-output.txt

      - name: Upload Vitest output
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: vitest-output
          path: vitest-output.txt
          if-no-files-found: warn

  rls-tests:
    name: RLS integration tests
    runs-on: ubuntu-latest
    needs: lint-and-unit
    # Skip on Dependabot PRs. The harness uses no production secrets
    # (everything runs against a local Supabase stack on the runner),
    # but Dependabot bumps never touch RLS policies, so spending the
    # ~3-min CLI install + ~2-min stack start on every dep PR isn't
    # justified.
    if: github.actor != 'dependabot[bot]'
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install dependencies
        run: bun install

      - name: Install supabase CLI
        # ubuntu-latest GitHub-hosted runners ship Docker; we need the
        # supabase CLI on top to drive `supabase start` / `db reset`.
        run: |
          curl -fsSL https://github.com/supabase/cli/releases/latest/download/supabase_linux_amd64.deb -o /tmp/supabase.deb
          sudo dpkg -i /tmp/supabase.deb
          supabase --version

      - name: Start Supabase local stack
        # Cold start in CI is ~2-5 min as Docker pulls the postgres,
        # gotrue, postgrest, storage-api, and realtime images. Allow up
        # to 10 min before we consider the start hung.
        timeout-minutes: 10
        run: supabase start

      - name: Run RLS tests
        shell: bash
        run: |
          set -o pipefail
          bun run test:rls 2>&1 | tee rls-test-output.txt

      - name: Upload RLS test output
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: rls-test-output
          path: rls-test-output.txt
          if-no-files-found: warn

      - name: Stop Supabase local stack
        # Best-effort — runner cleanup catches anything we miss.
        if: always()
        run: supabase stop --no-backup || true

  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    needs: lint-and-unit
    # Skip on Dependabot PRs: they run without access to repo secrets
    # (secrets must be duplicated into the Dependabot namespace), so
    # SUPABASE_ANON_KEY and other E2E creds come through empty. Unit
    # tests and lint still run on these PRs.
    if: github.actor != 'dependabot[bot]'
    # Only one E2E suite at a time — tests create/delete shifts on a
    # shared production DB. Parallel runs (push + PR sync events)
    # delete each other's test shifts mid-test, causing FK errors.
    concurrency:
      group: e2e-playwright
      cancel-in-progress: false
    env:
      # Always run Playwright against the production deployment for
      # now. The earlier attempt to construct the Vercel PR preview
      # URL from the branch name (e.g. "*-git-<branch>-<team>.vercel.app")
      # never resolved — branch slugs longer than 63 chars get
      # truncated by Vercel and the team-slug guess was wrong. We can
      # add proper preview-URL detection later (Vercel deployment API
      # or the Vercel GitHub bot's PR comment) once the suite is
      # otherwise stable.
      PLAYWRIGHT_BASE_URL: https://easterseals-volunteer-scheduler.vercel.app
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      TEST_VOLUNTEER_EMAIL: ${{ secrets.TEST_VOLUNTEER_EMAIL }}
      TEST_COORDINATOR_EMAIL: ${{ secrets.TEST_COORDINATOR_EMAIL }}
      TEST_ADMIN_EMAIL: ${{ secrets.TEST_ADMIN_EMAIL }}
      TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install dependencies
        run: bun install

      - name: Install Playwright browser (chromium only)
        run: bunx playwright install --with-deps chromium

      - name: Smoke-check production URL is reachable
        shell: bash
        run: |
          echo "Targeting $PLAYWRIGHT_BASE_URL"
          if ! curl -fsS -o /dev/null --max-time 30 "$PLAYWRIGHT_BASE_URL"; then
            echo "Production URL is not reachable. Aborting."
            exit 1
          fi
          echo "Production URL responded OK."

      - name: Run Playwright E2E
        shell: bash
        run: |
          set -o pipefail
          bunx playwright test --config tests/e2e/playwright.config.ts 2>&1 | tee playwright-output.txt

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: warn

      - name: Upload Playwright output
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-output
          path: playwright-output.txt
          if-no-files-found: warn

  comment-on-pr:
    name: Comment test results on PR
    runs-on: ubuntu-latest
    needs: [lint-and-unit, e2e]
    if: github.event_name == 'pull_request' && always()
    # The default GITHUB_TOKEN on PRs from feature branches has
    # contents:read only — it can't post comments back to the PR.
    # Grant the minimum needed for github.rest.issues.createComment
    # to succeed: pull-requests: write covers PR comments.
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: Download Vitest output
        uses: actions/download-artifact@v8
        with:
          name: vitest-output
          path: ./vitest
        continue-on-error: true

      - name: Download Playwright output
        uses: actions/download-artifact@v8
        with:
          name: playwright-output
          path: ./playwright
        continue-on-error: true

      - name: Post combined comment
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const read = (p) => {
              try {
                return fs.readFileSync(p, 'utf-8').slice(-2000);
              } catch {
                return '(no output captured)';
              }
            };
            const vitest = read('./vitest/vitest-output.txt');
            const playwright = read('./playwright/playwright-output.txt');
            const unitStatus = '${{ needs.lint-and-unit.result }}';
            const e2eStatus = '${{ needs.e2e.result }}';
            const badge = (r) => r === 'success' ? '✅' : r === 'skipped' ? '⏭️' : '❌';
            const body = [
              '### 🧪 Test Results',
              '',
              `| Stage | Status |`,
              `| --- | --- |`,
              `| Lint + Vitest | ${badge(unitStatus)} ${unitStatus} |`,
              `| Playwright E2E | ${badge(e2eStatus)} ${e2eStatus} |`,
              '',
              '<details><summary>Vitest output (tail)</summary>',
              '',
              '```',
              vitest,
              '```',
              '',
              '</details>',
              '',
              '<details><summary>Playwright output (tail)</summary>',
              '',
              '```',
              playwright,
              '```',
              '',
              '</details>',
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
