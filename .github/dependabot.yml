version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
    # Split-package majors Dependabot can't coordinate correctly — it
    # bumps one package per PR (or an incomplete group) and leaves
    # siblings on the older major, producing half-migrated states that
    # crash at install or test time. Majors on these packages are done
    # by hand in a single coordinated PR; patch + minor bumps still
    # flow through normally.
    #
    # Real incidents behind each entry:
    #   - PR #73: @eslint/js 9→10 alone → preserve-caught-error rule
    #     crashes ESLint 9 core at lint time (peerOptional didn't block
    #     install). Full ESLint 10 migration deferred.
    #   - PR #79: react + @types/react bumped to 19 but react-dom and
    #     @types/react-dom stayed at 18 → npm peer-dep conflict on
    #     install AND `ReactCurrentDispatcher undefined` crash in
    #     Vitest when react-dom 18 loads against react 19. React 19
    #     migration also needs app-level work (render API changes,
    #     Suspense semantics, etc.) — a Sprint-scheduled effort.
    #   - PRs #81/#86/#88: react-resizable-panels 2→4, react-day-picker
    #     8→9, and recharts 2→3 all merged auto-green because tsc wasn't
    #     running in CI at the time. Each broke the call-sites in
    #     shadcn-generated UI components (calendar.tsx, resizable.tsx,
    #     chart.tsx) via breaking API changes. Discovered + rolled back
    #     in PR #99 once tsc-in-CI started enforcing. Each needs its
    #     own migration PR.
    ignore:
      # ESLint ecosystem
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@eslint/js"
        update-types: ["version-update:semver-major"]
      # React ecosystem — all four must move together
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-dom"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@types/react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@types/react-dom"
        update-types: ["version-update:semver-major"]
      # Shadcn-consumed UI libraries — each major bump requires hand-
      # migrating the generated UI components and is non-trivial
      - dependency-name: "recharts"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-day-picker"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-resizable-panels"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
